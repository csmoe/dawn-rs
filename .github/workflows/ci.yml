name: CI

on:
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download Dawn prebuilt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dawn_tag="$(cat DAWN_VERSION)"
          if [[ -z "$dawn_tag" ]]; then
            echo "DAWN_VERSION is empty" >&2
            exit 1
          fi
          case "${{ runner.os }}" in
            Linux) platform=linux ;;
            macOS) platform=macos ;;
            Windows) platform=windows ;;
            *) echo "Unsupported runner OS: ${{ runner.os }}" >&2; exit 1 ;;
          esac
          dawn_root="$(python3 ./scripts/download_dawn_prebuilt.py --tag "$dawn_tag" --platform "$platform" --output ".ci/dawn")"
          echo "DAWN_ROOT=$dawn_root" >> "$GITHUB_ENV"
          echo "Using DAWN tag=$dawn_tag DAWN_ROOT=$dawn_root"

      - name: Cargo build workspace
        run: cargo build --workspace

      - name: Build dawn-rs examples (default)
        run: cargo build -p dawn-rs --examples

      - name: Build dawn-rs wire example
        run: cargo build -p dawn-rs --example triangle-wire --features wire

      - name: Build dawn-wgpu examples (default)
        run: cargo build -p dawn-wgpu --examples

      - name: Build dawn-wgpu wire example
        run: cargo build -p dawn-wgpu --example nya-cat-wire --features wire
