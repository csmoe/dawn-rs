name: CI

on:
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install MSVC target (Windows)
        if: runner.os == 'Windows'
        run: rustup target add x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Read Dawn tag
        id: dawn_tag
        run: |
          dawn_tag="$(tr -d '\r\n' < DAWN_VERSION)"
          if [[ -z "$dawn_tag" ]]; then
            echo "DAWN_VERSION is empty" >&2
            exit 1
          fi
          echo "value=$dawn_tag" >> "$GITHUB_OUTPUT"

      - name: Cache Dawn source + deps + build
        uses: actions/cache@v4
        with:
          path: .ci/dawn-cache
          key: dawn-${{ runner.os }}-${{ steps.dawn_tag.outputs.value }}-v1

      - name: Install Dawn build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build clang lld cmake pkg-config \
            libxrandr-dev libxinerama-dev libxcursor-dev mesa-common-dev libx11-xcb-dev libxi-dev \
            protobuf-compiler

      - name: Install Dawn build deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja cmake protoc -y

      - name: Set up MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Dawn build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja protobuf || true

      - name: Download and build Dawn from source
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python3 ./scripts/build_dawn_ci.py
          --tag "${{ steps.dawn_tag.outputs.value }}"
          --cache-root ".ci/dawn-cache"
          --runner-os "${{ runner.os }}"

      - name: Set cargo target args
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "CARGO_TARGET_ARGS=--target x86_64-pc-windows-msvc" >> "$GITHUB_ENV"
          else
            echo "CARGO_TARGET_ARGS=" >> "$GITHUB_ENV"
          fi

      - name: Cargo build workspace
        run: cargo build --workspace $CARGO_TARGET_ARGS

      - name: Build dawn-rs examples (default)
        run: cargo build -p dawn-rs --examples $CARGO_TARGET_ARGS

      #- name: Build dawn-rs wire example
      #  run: cargo build -p dawn-rs --example triangle-wire --features wire

      - name: Build dawn-wgpu examples (default)
        run: cargo build -p dawn-wgpu --examples $CARGO_TARGET_ARGS

      #- name: Build dawn-wgpu wire example
      #  run: cargo build -p dawn-wgpu --example nya-cat-wire --features wire
